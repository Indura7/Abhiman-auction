<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhiman Welfare — Auction Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4;
    --text: #1a1814; --text2: #6b6760; --text3: #9e9b96;
    --accent: #3368cb; --accent-light: #e8f0fe; --accent-text: #2478b4;
    --warn: #b45309; --warn-light: #fef3c7;
    --danger: #991b1b; --danger-light: #fee2e2;
    --lot: #6d28d9; --lot-light: #ede9fe; --lot-text: #4c1d95;
    --radius: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .header-date { font-size: 14px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 57px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto; }
  .main { padding: 1.5rem 2rem 4rem; }
  .tabs { display: flex; flex-direction: column; gap: 4px; }
  .tab { width: 100%; padding: 12px 16px; border: none; border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text2); transition: all 0.15s; text-align: left; }
  .tab:hover { background: var(--surface2); }
  .tab.active { background: var(--accent); color: #fff; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 25px; font-weight: 600; margin-bottom: 1.25rem; color: var(--text); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row-4 { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], input[type=number] { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: 'DM Sans', sans-serif; background: var(--surface2); color: var(--text); outline: none; transition: border 0.15s; }
  input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--lot); }
  input:focus { border-color: var(--accent); background: #fff; }
  .btn { padding: 10px 20px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text); transition: all 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-text); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-danger { background: var(--danger-light); color: var(--danger); border-color: #fca5a5; }
  .btn-success { background: var(--accent-light); color: var(--accent-text); border-color: #93c5fd; }
  .btn-lot { background: var(--lot-light); color: var(--lot); border-color: #c4b5fd; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th { text-align: left; font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; padding: 0 10px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.sub-row td { background: var(--surface2); font-size: 13px; }
  tr.lot-row td { background: var(--lot-light); }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; display: inline-block; font-weight: 500; }
  .badge-pending { background: var(--warn-light); color: var(--warn); }
  .badge-sold { background: var(--accent-light); color: var(--accent-text); }
  .badge-lot { background: var(--lot-light); color: var(--lot); }
  .metric-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 1.25rem; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .metric-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .metric-value.profit { color: var(--accent); }
  .empty { text-align: center; color: var(--text3); font-size: 15px; padding: 3rem 1rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .sell-input { width: 110px; padding: 7px 10px !important; font-size: 14px !important; }
  .sidebar-section { margin-bottom: 1.75rem; }
  .sidebar-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; padding: 0 6px; }
  .sidebar-stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: var(--radius); margin-bottom: 2px; }
  .sidebar-stat:hover { background: var(--surface2); }
  .sidebar-stat-label { font-size: 14px; color: var(--text2); }
  .sidebar-stat-val { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }
  .sidebar-stat-val.profit { color: var(--accent); }
  .sync-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text3); flex-shrink: 0; display: inline-block; }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.err { background: #ef4444; }
  .lot-panel { background: var(--lot-light); border: 1px solid #c4b5fd; border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
  .lot-panel-title { font-size: 15px; font-weight: 600; color: var(--lot); margin-bottom: 1rem; }
  .lot-item-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #ddd6fe; }
  .lot-item-row:last-child { border-bottom: none; }
  .lot-selected-count { font-size: 13px; color: var(--lot); font-weight: 500; margin-bottom: 10px; }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .tabs { flex-direction: row; }
    .metric-grid { grid-template-columns: repeat(3, 1fr); }
    .form-row-4 { grid-template-columns: 1fr 1fr; }
    .main { padding: 1.25rem 1rem 4rem; }
  }
  @media (max-width: 480px) {
    .form-row, .form-row-4 { grid-template-columns: 1fr; }
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <div class="logo">Abhiman <span>Welfare Society</span> — Auction</div>
  <div class="header-date" id="hdate"></div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <div class="tabs">
        <button class="tab active" onclick="showTab('items')">📦  Items Stock</button>
        <button class="tab" onclick="showTab('auction')">🔨  Auction</button>
        <button class="tab" onclick="showTab('summary')">📊  Summary</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Quick stats</div>
      <div class="sidebar-stat"><span class="sidebar-stat-label">Total items</span><span class="sidebar-stat-val" id="qs-total">0</span></div>
      <div class="sidebar-stat"><span class="sidebar-stat-label">Sold</span><span class="sidebar-stat-val" id="qs-sold">0</span></div>
      <div class="sidebar-stat"><span class="sidebar-stat-label">Pending</span><span class="sidebar-stat-val" id="qs-pending">0</span></div>
      <div class="sidebar-stat"><span class="sidebar-stat-label">Lots</span><span class="sidebar-stat-val" id="qs-lots">0</span></div>
      <div class="sidebar-stat"><span class="sidebar-stat-label">Profit</span><span class="sidebar-stat-val profit" id="qs-profit">Rs.0</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Google Sheets</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span class="sync-dot" id="sync-dot"></span>
        <span style="font-size:13px;color:var(--text2);" id="sync-msg">Ready</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-success btn-sm" onclick="syncToSheet()">↑ Sync to Sheet</button>
        <button class="btn btn-sm" onclick="loadFromSheet()">↓ Load from Sheet</button>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- ITEMS TAB -->
    <div class="section active" id="tab-items">
      <div class="card">
        <div class="card-title">Add item</div>
        <div class="form-row-4">
          <div class="form-group"><label>Item name</label><input type="text" id="item-name" placeholder="e.g. Steam iron" /></div>
          <div class="form-group"><label>Brand / model</label><input type="text" id="item-brand" placeholder="e.g. Philips GC1905" /></div>
          <div class="form-group"><label>Cost (Rs.)</label><input type="number" id="item-cost" placeholder="2500" min="0" /></div>
          <div class="form-group"><label>Quantity</label><input type="number" id="item-qty" value="1" min="1" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Notes (optional)</label><input type="text" id="item-notes" placeholder="e.g. Red colour, 1000W" /></div>
          <div class="form-group" style="justify-content:flex-end;">
            <button class="btn btn-primary" onclick="addItem()" style="margin-top:auto;">Add item</button>
          </div>
        </div>
      </div>
      <div id="items-list"></div>
    </div>

    <!-- AUCTION TAB -->
    <div class="section" id="tab-auction">
      <!-- LOT CREATOR -->
      <div class="lot-panel" id="lot-panel" style="display:none;">
        <div class="lot-panel-title">Create pack — Select items</div>
        <div id="lot-select-list"></div>
        <div style="margin-top:1rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="lot-name" placeholder="Lot name (e.g. Kitchen Bundle)" style="flex:1;min-width:180px;" />
          <button class="btn btn-lot" onclick="createLot()">Create Lot</button>
          <button class="btn btn-sm" onclick="cancelLot()">Cancel</button>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px;">
          <div class="card-title" style="margin-bottom:0;">Real time Auction update</div>
          <button class="btn btn-lot btn-sm" onclick="toggleLotPanel()">Create a pack</button>
        </div>
        <p style="font-size:14px;color:var(--text2);margin-bottom:1rem;">Same model units can be added separately. Use "Create Lot" to bundle items together.</p>
        <div style="margin-bottom:1rem;">
          <input type="text" id="auction-search" placeholder="Search by item name." oninput="renderAuction()" style="width:100%;font-size:15px;" />
        </div>
        <div id="auction-list"></div>
      </div>
    </div>

    <!-- SUMMARY TAB -->
    <div class="section" id="tab-summary">
      <div class="metric-grid" id="metrics"></div>
      <div class="card">
        <div class="card-title">Item breakdown</div>
        <div id="summary-table"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtaZOoZpqPDsb-Rdsg5AWwDgRoZufeWs0B3dc-gBPsnRc9Oemj4eOxVZNxT82rOK6q/exec';
const SHEET_ID = '1PmHvb134v3oD11TmoEmVRaJ0Fpl4GtRxxvjXJZ8GZGU';

let items = JSON.parse(localStorage.getItem('abhiman_items') || '[]');
let lots = JSON.parse(localStorage.getItem('abhiman_lots') || '[]');

document.getElementById('hdate').textContent = new Date().toLocaleDateString('si-LK', {year:'numeric',month:'long',day:'numeric'});

function setSyncStatus(msg, type) {
  document.getElementById('sync-msg').textContent = msg;
  document.getElementById('sync-dot').className = 'sync-dot' + (type ? ' ' + type : '');
}

function updateQuickStats() {
  const soldItems = items.filter(it => it.soldPrice !== null && !it.lotId);
  const soldLots = lots.filter(l => l.soldPrice !== null);
  const itemRevenue = soldItems.reduce((s,it) => s + it.soldPrice, 0);
  const lotRevenue = soldLots.reduce((s,l) => s + l.soldPrice, 0);
  const itemCost = soldItems.reduce((s,it) => s + it.cost, 0);
  const lotCost = soldLots.reduce((s,l) => {
    return s + items.filter(it => it.lotId === l.id).reduce((a,it) => a + it.cost, 0);
  }, 0);
  const profit = (itemRevenue + lotRevenue) - (itemCost + lotCost);
  const pendingItems = items.filter(it => it.soldPrice === null && !it.lotId).length;
  const pendingLots = lots.filter(l => l.soldPrice === null).length;

  document.getElementById('qs-total').textContent = items.length;
  document.getElementById('qs-sold').textContent = soldItems.length + ' items + ' + soldLots.length + ' lots';
  document.getElementById('qs-pending').textContent = pendingItems + ' items + ' + pendingLots + ' lots';
  document.getElementById('qs-lots').textContent = lots.length;
  document.getElementById('qs-profit').textContent = (profit >= 0 ? '+' : '') + 'Rs.' + profit.toLocaleString();
}

async function syncToSheet() {
  setSyncStatus('Syncing...', '');
  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'write', sheetId: SHEET_ID, items, lots }) });
    const d = await res.json();
    setSyncStatus(d.ok ? 'Synced — ' + new Date().toLocaleTimeString() : 'Sync failed', d.ok ? 'ok' : 'err');
  } catch(e) { setSyncStatus('Error: ' + e.message, 'err'); }
}

async function loadFromSheet() {
  setSyncStatus('Loading...', '');
  try {
    const res = await fetch(SCRIPT_URL + '?sheetId=' + SHEET_ID);
    const d = await res.json();
    items = d.items.map(it => ({ ...it, cost: Number(it.cost), soldPrice: it.soldPrice === null ? null : Number(it.soldPrice) }));
    lots = d.lots || [];
    localStorage.setItem('abhiman_items', JSON.stringify(items));
    localStorage.setItem('abhiman_lots', JSON.stringify(lots));
    setSyncStatus('Loaded — ' + new Date().toLocaleTimeString(), 'ok');
    updateQuickStats(); renderItems();
  } catch(e) { setSyncStatus('Error: ' + e.message, 'err'); }
}

function save() {
  localStorage.setItem('abhiman_items', JSON.stringify(items));
  localStorage.setItem('abhiman_lots', JSON.stringify(lots));
  setSyncStatus('Unsaved — click sync', 'err');
  updateQuickStats();
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['items','auction','summary'][i] === t));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'auction') renderAuction();
  if (t === 'summary') renderSummary();
  if (t === 'items') renderItems();
}

function addItem() {
  const name = document.getElementById('item-name').value.trim();
  const brand = document.getElementById('item-brand').value.trim();
  const cost = parseFloat(document.getElementById('item-cost').value);
  const qty = parseInt(document.getElementById('item-qty').value) || 1;
  const notes = document.getElementById('item-notes').value.trim();
  if (!name || isNaN(cost)) { alert('Item name and cost price are must.\n Add at least name and price'); return; }
  for (let i = 0; i < qty; i++) items.push({ id: Date.now() + i, name, brand, notes, cost, soldPrice: null, lotId: null });
  save(); renderItems();
  ['item-name','item-brand','item-cost','item-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('item-qty').value = 1;
}

function deleteItem(id) {
  const it = items.find(x => x.id === id);
  if (it && it.lotId) { alert('This item has been added to a lot.\n So please delete that lot..'); return; }
  items = items.filter(it => it.id !== id);
  save(); renderItems();
}

function groupByModel(arr) {
  const g = {};
  arr.forEach(it => { const k = it.name+'||'+it.brand; if (!g[k]) g[k]=[]; g[k].push(it); });
  return g;
}

function renderItems() {
  const el = document.getElementById('items-list');
  if (!items.length) { el.innerHTML = '<div class="empty">There is no items. Please add some..</div>'; return; }
  const groups = groupByModel(items);
  let html = '';
  for (const key in groups) {
    const g = groups[key];
    html += `<div class="card"><div class="card-title">${g[0].name}${g[0].brand?' — '+g[0].brand:''} <span style="font-weight:400;color:var(--text2);font-size:14px;">(${g.length} unit${g.length>1?'s':''})</span></div>
    <table><thead><tr><th>#</th><th>Cost</th><th>Notes</th><th>Status</th><th></th></tr></thead><tbody>`;
    g.forEach((it,i) => {
      const lotLabel = it.lotId ? `<span class="badge badge-lot">Lot: ${lots.find(l=>l.id===it.lotId)?.name||'?'}</span>` : '';
      const statusLabel = it.soldPrice !== null
        ? `<span class="badge badge-sold">Sold Rs.${it.soldPrice.toLocaleString()}</span>`
        : it.lotId ? lotLabel : `<span class="badge badge-pending">Pending</span>`;
      html += `<tr><td style="color:var(--text3)">${i+1}</td><td>Rs.${it.cost.toLocaleString()}</td>
      <td style="color:var(--text2)">${it.notes||'—'}</td>
      <td>${statusLabel}${it.lotId && it.soldPrice === null ? '' : ''}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteItem(${it.id})">Remove</button></td></tr>`;
    });
    html += '</tbody></table></div>';
  }
  el.innerHTML = html;
  updateQuickStats();
}

// LOT FUNCTIONS
function toggleLotPanel() {
  const panel = document.getElementById('lot-panel');
  if (panel.style.display === 'none') {
    renderLotSelectList();
    panel.style.display = 'block';
  } else {
    panel.style.display = 'none';
  }
}

function cancelLot() {
  document.getElementById('lot-panel').style.display = 'none';
  document.getElementById('lot-name').value = '';
}

function renderLotSelectList() {
  const pending = items.filter(it => it.soldPrice === null && !it.lotId);
  const el = document.getElementById('lot-select-list');
  if (!pending.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text2);">No any Pending items.</p>'; return; }
  let html = '';
  pending.forEach(it => {
    const same = pending.filter(x => x.name===it.name&&x.brand===it.brand);
    const num = same.length>1?` #${same.indexOf(it)+1}`:'';
    html += `<div class="lot-item-row">
      <input type="checkbox" id="lot-chk-${it.id}" value="${it.id}" onchange="updateLotCount()" />
      <label for="lot-chk-${it.id}" style="flex:1;cursor:pointer;font-size:14px;">
        ${it.name}${it.brand?' / '+it.brand:''}${num} <span style="color:var(--text3);font-size:12px;">— Rs.${it.cost.toLocaleString()}</span>
      </label>
    </div>`;
  });
  el.innerHTML = html + '<div class="lot-selected-count" id="lot-count" style="margin-top:10px;">0 items selected | Total cost: Rs.0</div>';
}

function updateLotCount() {
  const checked = getCheckedItemIds();
  const total = checked.reduce((s,id) => s + (items.find(it=>it.id==id)?.cost||0), 0);
  document.getElementById('lot-count').textContent = `${checked.length} items selected | Total cost: Rs.${total.toLocaleString()}`;
}

function getCheckedItemIds() {
  return [...document.querySelectorAll('#lot-select-list input[type=checkbox]:checked')].map(c => Number(c.value));
}

function createLot() {
  const selectedIds = getCheckedItemIds();
  if (selectedIds.length < 2) { alert('Select at least 2 items to create a bundle'); return; }
  const name = document.getElementById('lot-name').value.trim() || ('Lot ' + (lots.length + 1));
  const lotId = Date.now();
  const lotCost = selectedIds.reduce((s,id) => s + (items.find(it=>it.id===id)?.cost||0), 0);
  lots.push({ id: lotId, name, itemIds: selectedIds, soldPrice: null, cost: lotCost });
  selectedIds.forEach(id => { const it = items.find(x=>x.id===id); if(it) it.lotId = lotId; });
  save();
  cancelLot();
  renderAuction();
}

function deleteLot(lotId) {
  if (!confirm('Are you sure? Items return as separeted items.')) return;
  items.forEach(it => { if(it.lotId === lotId) { it.lotId = null; it.soldPrice = null; } });
  lots = lots.filter(l => l.id !== lotId);
  save(); renderAuction();
}

function markLotSold(lotId) {
  const val = parseFloat(document.getElementById('lot-sell-'+lotId).value);
  if (isNaN(val)||val<0) { alert('Sold price is must..'); return; }
  const lot = lots.find(l=>l.id===lotId);
  if (lot) { lot.soldPrice=val; save(); renderAuction(); }
}

function unmarkLotSold(lotId) {
  const lot = lots.find(l=>l.id===lotId);
  if (lot) { lot.soldPrice=null; save(); renderAuction(); }
}

function renderAuction() {
  const el = document.getElementById('auction-list');
  const q = (document.getElementById('auction-search')?.value || '').toLowerCase();
  const pendingItems = items.filter(it => it.soldPrice===null && !it.lotId && (!q || it.name.toLowerCase().includes(q) || (it.brand||'').toLowerCase().includes(q) || (it.notes||'').toLowerCase().includes(q)));
  const pendingLots = lots.filter(l => l.soldPrice===null && (!q || l.name.toLowerCase().includes(q) || items.filter(it=>it.lotId===l.id).some(it=>it.name.toLowerCase().includes(q))));
  const soldItems = items.filter(it => it.soldPrice!==null && !it.lotId && (!q || it.name.toLowerCase().includes(q) || (it.brand||'').toLowerCase().includes(q)));
  const soldLots = lots.filter(l => l.soldPrice!==null && (!q || l.name.toLowerCase().includes(q) || items.filter(it=>it.lotId===l.id).some(it=>it.name.toLowerCase().includes(q))));

  if (!items.length && !lots.length) { el.innerHTML = '<div class="empty">Please add some items on Item Stock menu</div>'; return; }

  let html = '';

  // Pending lots
  if (pendingLots.length) {
    html += `<p style="font-size:14px;color:var(--lot);margin-bottom:12px;font-weight:600;">🎁 Lots — Pending (${pendingLots.length})</p>`;
    html += '<table><thead><tr><th>Lot name</th><th>Items</th><th>Total cost</th><th>Sold price (Rs.)</th><th></th></tr></thead><tbody>';
    pendingLots.forEach(lot => {
      const lotItems = items.filter(it=>it.lotId===lot.id);
      const itemNames = lotItems.map(it=>it.name+(it.brand?' /'+it.brand:'')).join(', ');
      html += `<tr class="lot-row">
        <td><strong style="color:var(--lot)">${lot.name}</strong></td>
        <td style="font-size:13px;color:var(--text2);">${itemNames}</td>
        <td>Rs.${lot.cost.toLocaleString()}</td>
        <td><input type="number" class="sell-input" id="lot-sell-${lot.id}" placeholder="8000" min="0"/></td>
        <td style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-sm btn-lot" onclick="markLotSold(${lot.id})">Mark sold</button>
          <button class="btn btn-sm btn-danger" onclick="deleteLot(${lot.id})">Delete</button>
        </td></tr>`;
    });
    html += '</tbody></table><hr class="divider">';
  }

  // Pending individual items
  if (pendingItems.length) {
    html += `<p style="font-size:14px;color:var(--text2);margin-bottom:12px;font-weight:500;">Items — Pending (${pendingItems.length})</p>`;
    html += '<table><thead><tr><th>Item</th><th>Cost</th><th>Sold price (Rs.)</th><th></th></tr></thead><tbody>';
    pendingItems.forEach(it => {
      const same = pendingItems.filter(x=>x.name===it.name&&x.brand===it.brand);
      const num = same.length>1?` #${same.indexOf(it)+1}`:'';
      html += `<tr><td>${it.name}${it.brand?' / '+it.brand:''}<span style="color:var(--text3)">${num}</span>${it.notes?`<br><span style="font-size:12px;color:var(--text3)">${it.notes}</span>`:''}</td>
      <td>Rs.${it.cost.toLocaleString()}</td>
      <td><input type="number" class="sell-input" id="sell-${it.id}" placeholder="4500" min="0"/></td>
      <td><button class="btn btn-sm btn-success" onclick="markSold(${it.id})">Mark sold</button></td></tr>`;
    });
    html += '</tbody></table>';
  }

  // Sold section
  if (soldLots.length || soldItems.length) {
    html += `<hr class="divider"><p style="font-size:14px;color:var(--text2);margin-bottom:12px;font-weight:500;">Sold</p>`;
    html += '<table><thead><tr><th>Item / Lot</th><th>Cost</th><th>Sold for</th><th>Profit</th><th></th></tr></thead><tbody>';

    soldLots.forEach(lot => {
      const profit = lot.soldPrice - lot.cost;
      const pc = profit>=0?'var(--accent)':'var(--danger)';
      const lotItems = items.filter(it=>it.lotId===lot.id);
      const itemNames = lotItems.map(it=>it.name).join(' + ');
      html += `<tr class="lot-row"><td><span class="badge badge-lot">Lot</span> <strong>${lot.name}</strong><br><span style="font-size:12px;color:var(--text2)">${itemNames}</span></td>
      <td>Rs.${lot.cost.toLocaleString()}</td><td>Rs.${lot.soldPrice.toLocaleString()}</td>
      <td style="color:${pc};font-weight:600">${profit>=0?'+':''}Rs.${profit.toLocaleString()}</td>
      <td><button class="btn btn-sm btn-danger" onclick="unmarkLotSold(${lot.id})">Undo</button></td></tr>`;
    });

    soldItems.forEach(it => {
      const profit = it.soldPrice-it.cost;
      const pc = profit>=0?'var(--accent)':'var(--danger)';
      html += `<tr><td>${it.name}${it.brand?' / '+it.brand:''}${it.notes?`<br><span style="font-size:12px;color:var(--text3)">${it.notes}</span>`:''}</td>
      <td>Rs.${it.cost.toLocaleString()}</td><td>Rs.${it.soldPrice.toLocaleString()}</td>
      <td style="color:${pc};font-weight:600">${profit>=0?'+':''}Rs.${profit.toLocaleString()}</td>
      <td><button class="btn btn-sm btn-danger" onclick="unmarkSold(${it.id})">Undo</button></td></tr>`;
    });
    html += '</tbody></table>';
  }

  el.innerHTML = html;
}

function markSold(id) {
  const val = parseFloat(document.getElementById('sell-'+id).value);
  if (isNaN(val)||val<0) { alert('Please add Sold price.'); return; }
  const it = items.find(x=>x.id===id);
  if (it) { it.soldPrice=val; save(); renderAuction(); }
}

function unmarkSold(id) {
  const it = items.find(x=>x.id===id);
  if (it) { it.soldPrice=null; save(); renderAuction(); }
}

function renderSummary() {
  const soldItems = items.filter(it=>it.soldPrice!==null&&!it.lotId);
  const soldLots = lots.filter(l=>l.soldPrice!==null);
  const totalItemCost = items.filter(it=>!it.lotId).reduce((s,it)=>s+it.cost,0);
  const totalLotCost = lots.reduce((s,l)=>s+l.cost,0);
  const totalCost = totalItemCost + totalLotCost;
  const itemRevenue = soldItems.reduce((s,it)=>s+it.soldPrice,0);
  const lotRevenue = soldLots.reduce((s,l)=>s+l.soldPrice,0);
  const totalRevenue = itemRevenue + lotRevenue;
  const soldCost = soldItems.reduce((s,it)=>s+it.cost,0) + soldLots.reduce((s,l)=>s+l.cost,0);
  const totalProfit = totalRevenue - soldCost;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total items</div><div class="metric-value">${items.length}</div></div>
    <div class="metric"><div class="metric-label">Lots</div><div class="metric-value">${lots.length}</div></div>
    <div class="metric"><div class="metric-label">Pending</div><div class="metric-value">${items.filter(it=>!it.lotId&&it.soldPrice===null).length+lots.filter(l=>l.soldPrice===null).length}</div></div>
    <div class="metric"><div class="metric-label">Total cost</div><div class="metric-value" style="font-size:17px;">Rs.${totalCost.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Revenue</div><div class="metric-value" style="font-size:17px;">Rs.${totalRevenue.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Profit</div><div class="metric-value profit" style="font-size:17px;">${totalProfit>=0?'+':''}Rs.${totalProfit.toLocaleString()}</div></div>`;

  let html = '<table><thead><tr><th>Item / Lot</th><th>Units</th><th>Cost</th><th>Revenue</th><th>Profit</th></tr></thead><tbody>';

  // Lots in summary
  lots.forEach(lot => {
    const profit = lot.soldPrice!==null ? lot.soldPrice-lot.cost : null;
    const pc = profit!==null?(profit>=0?'var(--accent)':'var(--danger)'):'var(--text3)';
    const lotItems = items.filter(it=>it.lotId===lot.id);
    html += `<tr class="lot-row"><td><span class="badge badge-lot" style="margin-bottom:4px;">Lot</span><br><strong>${lot.name}</strong><br><span style="font-size:12px;color:var(--text2)">${lotItems.map(it=>it.name).join(' + ')}</span></td>
    <td>${lotItems.length} items</td>
    <td>Rs.${lot.cost.toLocaleString()}</td>
    <td>${lot.soldPrice!==null?'Rs.'+lot.soldPrice.toLocaleString():'—'}</td>
    <td style="color:${pc};font-weight:600">${profit!==null?(profit>=0?'+':'')+'Rs.'+profit.toLocaleString():'—'}</td></tr>`;
  });

  // Individual items in summary
  const groups = groupByModel(items.filter(it=>!it.lotId));
  for (const key in groups) {
    const g = groups[key];
    const gCost = g.reduce((s,it)=>s+it.cost,0);
    const gSold = g.filter(it=>it.soldPrice!==null);
    const gRev = gSold.reduce((s,it)=>s+it.soldPrice,0);
    const gProfit = gRev-gSold.reduce((s,it)=>s+it.cost,0);
    const pc = gProfit>=0?'var(--accent)':'var(--danger)';
    html += `<tr><td><strong>${g[0].name}</strong>${g[0].brand?`<br><span style="font-size:12px;color:var(--text3)">${g[0].brand}</span>`:''}</td>
    <td>${g.length}<span style="color:var(--text3);font-size:12px"> (${gSold.length} sold)</span></td>
    <td>Rs.${gCost.toLocaleString()}</td><td>Rs.${gRev.toLocaleString()}</td>
    <td style="color:${pc};font-weight:600">${gProfit>=0?'+':''}Rs.${gProfit.toLocaleString()}</td></tr>`;
    if (g.length>1) {
      g.forEach((it,i)=>{
        const p=it.soldPrice!==null?it.soldPrice-it.cost:null;
        const ipc=p!==null?(p>=0?'var(--accent)':'var(--danger)'):'var(--text3)';
        html+=`<tr class="sub-row"><td style="padding-left:22px;color:var(--text2)">Unit ${i+1}${it.notes?' — '+it.notes:''}</td><td></td>
        <td style="color:var(--text2)">Rs.${it.cost.toLocaleString()}</td>
        <td style="color:var(--text2)">${it.soldPrice!==null?'Rs.'+it.soldPrice.toLocaleString():'—'}</td>
        <td style="color:${ipc}">${p!==null?(p>=0?'+':'')+'Rs.'+p.toLocaleString():'—'}</td></tr>`;
      });
    }
  }

  if (!items.length && !lots.length) { document.getElementById('summary-table').innerHTML='<div class="empty">Data empty.</div>'; return; }
  html += '</tbody></table>';
  document.getElementById('summary-table').innerHTML = html;
}

setSyncStatus('Ready', 'ok');
renderItems();
</script>
</body>
</html>
